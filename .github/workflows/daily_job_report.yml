name: Daily LinkedIn Job Report

on:
  schedule:
    # 10:30 PM IST = 17:00 UTC (IST is UTC+5:30)
    - cron: "0 17 * * *"
  workflow_dispatch:   # allows manual trigger from GitHub UI anytime

jobs:
  generate-and-send-report:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install requests openpyxl

      - name: Run job report script
        env:
          APIFY_API_TOKEN: ${{ secrets.APIFY_API_TOKEN }}
          EMAIL_SENDER:    ${{ secrets.EMAIL_SENDER }}
          EMAIL_PASSWORD:  ${{ secrets.EMAIL_PASSWORD }}
        run: |
          python scripts/generate_report.py

      - name: Upload report as artifact (backup)
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: linkedin-job-report-${{ github.run_id }}
          path: /tmp/Mohith_LinkedIn_Jobs_*.xlsx
          retention-days: 7
